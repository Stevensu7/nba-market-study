name: Refresh Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: refresh-dashboard
  cancel-in-progress: true

jobs:
  refresh-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh workbook and HTML
        run: python -m src.main refresh

      - name: Prepare dashboard artifact
        run: |
          mkdir -p site
          cp backtest.html site/index.html
          cp backtest.xlsx site/backtest.xlsx
          touch site/.nojekyll

      - name: Commit updated artifacts
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git add backtest.xlsx backtest.html
          git diff --cached --quiet || git commit -m "refresh dashboard data"
          git push

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-site
          path: site
